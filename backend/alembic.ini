# Alembic configuration — KuberaTreasury
# Run from: backend/
#   alembic upgrade head
#   alembic revision --autogenerate -m "description"

[alembic]
# Path is relative to the directory that contains this file (backend/).
script_location = alembic

# Template for new revision file names.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps.
timezone = UTC

# Maximum length for the slug portion of the filename.
truncate_slug_length = 40

# Allow revisions to be sorted by date rather than dependency order.
# Leave at "branchpoint" to keep deterministic ordering.
revision_environment = false

# Prepend sys.path with "." so `from app.xxx import …` resolves when
# running alembic from the backend/ directory.
prepend_sys_path = .

# SQLAlchemy URL is set programmatically in env.py from app.core.config.
# Leaving this blank here prevents accidental hard-coded credentials.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

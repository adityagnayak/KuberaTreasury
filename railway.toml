[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"

[[services]]
name = "api"
source = "backend"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[[services]]
name = "worker"
source = "backend"
startCommand = "python -m app.worker"

[[services]]
name = "postgres"
plugin = "postgresql"

[[services]]
name = "redis"
plugin = "redis"
